
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Store | Strange World</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/DPmtLPMj/Icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Rubik:wght@300;400;900&display=swap" rel="stylesheet">
    
    <!-- SDKs -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root { --orange: #ff4500; --cyan: #00e5ff; --dark: #020202; --card: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { background: var(--dark); color: #fff; font-family: 'Rubik', sans-serif; }

        header {
            padding: 20px 8%; display: flex; justify-content: space-between; align-items: center;
            background: #000; border-bottom: 4px solid var(--orange); position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-family: 'Lilita One'; font-size: 2rem; text-shadow: 2px 2px var(--orange); }
        
        /* Navegación corregida para evitar el Error 404 */
        nav a { font-family: 'Lilita One'; color: #fff; text-decoration: none; margin-left: 25px; transition: 0.3s; }
        nav a:hover, .active { color: var(--cyan); }

        .auth-container { max-width: 420px; margin: 80px auto; padding: 40px; background: var(--card); border-radius: 25px; border: 1px solid #1a1a1a; text-align: center; }
        h2 { font-family: 'Lilita One'; font-size: 2.2rem; color: var(--orange); margin-bottom: 20px; }

        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--cyan); }

        .btn { width: 100%; padding: 15px; background: var(--orange); border: none; border-radius: 12px; font-family: 'Lilita One'; color: #fff; font-size: 1.2rem; box-shadow: 0 5px 0 #9e2b00; transition: 0.2s; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #9e2b00; }

        #otpSection, #storeContent { display: none; }
        .footer-link { color: #555; font-size: 0.8rem; margin-top: 20px; display: block; text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">STRANGE WORLD</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="AboutUs.html">About Us</a> <!-- RUTA CORREGIDA -->
            <a href="Community.html">Community</a>
            <a href="Store.html" class="active">Store</a>
        </nav>
    </header>

    <div class="container">
        <!-- LOGIN / REGISTRO / RECUPERACIÓN (Todo en uno) -->
        <div id="authBox" class="auth-container">
            <h2 id="mainTitle">ACCESS TERMINAL</h2>
            <div id="emailSection">
                <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">Enter email to receive your access code.</p>
                <input type="email" id="emailInput" placeholder="Survivor Email">
                <button class="btn" onclick="sendCode()">GET CODE</button>
                <div style="margin-top: 20px; border-top: 1px solid #222; padding-top: 20px;">
                    <div id="g_id_onload" data-client_id="976725715682-qn73g5lfndmj0uvgboq5t75kfgchqn9u.apps.googleusercontent.com" data-callback="handleGoogle"></div>
                    <div class="g_id_signin" data-type="standard"></div>
                </div>
            </div>

            <div id="otpSection">
                <p style="color: var(--cyan); font-size: 0.9rem; margin-bottom: 20px;">Check your inbox. Code sent via EmailJS.</p>
                <input type="text" id="otpInput" placeholder="6-DIGIT CODE" style="text-align: center; letter-spacing: 10px; font-size: 1.5rem;">
                <button class="btn" onclick="verifyCode()">VERIFY IDENTITY</button>
                <a href="#" class="footer-link" onclick="location.reload()">Back / Forgot Email</a>
            </div>
        </div>

        <!-- TIENDA DESBLOQUEADA -->
        <div id="storeContent" class="auth-container" style="max-width: 600px;">
            <h2>STORE UNLOCKED</h2>
            <div style="background: #000; padding: 30px; border-radius: 20px; border: 1px dashed var(--orange);">
                <h3 style="font-family: 'Lilita One'; color: var(--cyan);">SHADOW HOPE I</h3>
                <p style="color: #888; margin: 15px 0;">Official Setup.exe for Windows.</p>
                <a href="https://github.com/StrangeWorldSH/Shadow-Hope/releases/download/1.0/Shadow_Hope_I_Setup.exe" class="btn" style="text-decoration: none; display: block; text-align: center;">DOWNLOAD NOW</a>
            </div>
            <a href="#" class="footer-link" onclick="logout()">Logout / Change Account</a>
        </div>
    </div>

    <script>
        (function() { emailjs.init("TU_PUBLIC_KEY"); })();

        let generatedCode = null;

        function sendCode() {
            const email = document.getElementById('emailInput').value;
            if(!email.includes('@')) return alert("Invalid Email");

            generatedCode = Math.floor(100000 + Math.random() * 900000);
            
            const params = {
                to_email: email,
                otp_code: generatedCode
            };

            // Usando tus credenciales de EmailJS
            emailjs.send('TU_SERVICE_ID', 'TU_TEMPLATE_ID', params)
                .then(() => {
                    document.getElementById('emailSection').style.display = 'none';
                    document.getElementById('otpSection').style.display = 'block';
                    document.getElementById('mainTitle').innerText = "VERIFY CODE";
                })
                .catch(err => alert("Error sending email. Check console."));
        }

        function verifyCode() {
            const input = document.getElementById('otpInput').value;
            if(input == generatedCode) {
                localStorage.setItem('sw_access', 'granted');
                unlockStore();
            } else {
                alert("Incorrect Code.");
            }
        }

        function handleGoogle(response) {
            localStorage.setItem('sw_access', 'granted');
            unlockStore();
        }

        function unlockStore() {
            document.getElementById('authBox').style.display = 'none';
            document.getElementById('storeContent').style.display = 'block';
        }

        function logout() {
            localStorage.removeItem('sw_access');
            location.reload();
        }

        // Mantener sesión iniciada
        if(localStorage.getItem('sw_access')) unlockStore();
    </script>
</body>
</html>
